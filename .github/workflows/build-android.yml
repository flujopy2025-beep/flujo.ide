name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean --no-install

      - name: Fix Kotlin/Compose version mismatch
        run: |
          # The Compose Compiler 1.5.15 requires Kotlin 1.9.25
          # Update kotlinVersion in android/build.gradle
          sed -i 's/kotlinVersion = "1.9.24"/kotlinVersion = "1.9.25"/' android/build.gradle
          sed -i "s/kotlinVersion = '1.9.24'/kotlinVersion = '1.9.25'/" android/build.gradle
          # Verify
          grep -i "kotlin" android/build.gradle || true

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon -Dorg.gradle.jvmargs="-Xmx4g"

      - name: Find and copy APK
        run: |
          APK_PATH=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No APK found!"
            find android/ -name "*.apk" 2>/dev/null || true
            exit 1
          fi
          cp "$APK_PATH" ./flujo-ide.apk
          echo "APK: $APK_PATH"
          ls -la ./flujo-ide.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: flujo-ide-apk
          path: ./flujo-ide.apk
          retention-days: 90

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-build.${{ github.run_number }}
          name: Flujo IDE v${{ steps.version.outputs.version }} (Build ${{ github.run_number }})
          body: |
            ## Flujo IDE - Android APK

            ### Download
            Download `flujo-ide.apk` below and install on your Android device.

            ### How to install
            1. Download the APK file on your Android phone
            2. Open the file (you may need to allow "Install from unknown sources" in Settings)
            3. Tap "Install"
            4. Open Flujo IDE from your app drawer

            ### What's included
            - Code editor with syntax highlighting (15+ languages)
            - AI Chat (OpenAI, Claude, Gemini) - bring your own API key
            - MCP (Model Context Protocol) client
            - File manager with tree view
            - Dark/Light themes

            ### Requirements
            - Android 6.0 (API 23) or higher
          files: ./flujo-ide.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
